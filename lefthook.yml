pre-commit:
  commands:
    format:
      run: pnpm format
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
    build:
      run: pnpm build
    update-docs:
      run: |
        CHANGED=$(git diff --name-only HEAD~1 -- 'src/**' 'scripts/**' 'package.json' 'vite.config.ts')
        if [ -n "$CHANGED" ]; then
          echo "📝 Source files changed — updating AGENTS.md and README.md with Claude..."
          claude -p "Source files have changed. Review the current codebase and update AGENTS.md and README.md to reflect the latest state. Only update what's necessary — don't rewrite from scratch. Keep the existing structure and style. Changed files: $CHANGED" --allowedTools Edit,Read,Glob,Grep
          git add AGENTS.md README.md
          git diff --cached --quiet AGENTS.md README.md || git commit --amend --no-edit
        fi
